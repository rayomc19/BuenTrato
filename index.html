<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El Buen Trato</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="light-mode"> <!-- Clase inicial -->

  <header class="header-main">
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand fw-bold text-success" href="#">Create by <br>Kiara Kaory Diaz Albino</a>
        
        <div class="d-flex align-items-center gap-3">
          <!-- BOTÓN MODO CLARO/OSCURO -->
          <button id="theme-toggle" class="btn btn-outline-success rounded-pill px-3">
            <span id="theme-icon">🌙</span> <span id="theme-text">Modo Oscuro</span>
          </button>
          
          <div class="icon-container">
            <img class="icon-cart" src="https://cdn-icons-png.flaticon.com/512/2589/2589175.png" alt="corazón" width="35">
          </div>
        </div>
      </div>
    </nav>
  </header>

  <section class="hero text-center">
    <div class="container py-5">
      <h1 class="display-4 fw-bold text-success">EL BUEN TRATO</h1>
      <h4 class="lead fw-bold italic theme-text-contrast">"El buen trato es el único lenguaje que el sordo puede oír y el ciego puede ver"</h4>
    </div>

<!-- Navegación secundaria (Barra de herramientas limpia) -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    
    <!-- Botón para móviles -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavSecundario">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNavSecundario">
      <!-- 1. Buscador a la izquierda (Ocupando un buen espacio) -->
      <div class="d-flex my-2 my-lg-0 me-auto w-100" style="max-width: 400px;">
        <input class="form-control buscador-estilo" type="text" id="buscador" placeholder="Buscar ámbito..." />
      </div>

    
  </div>
</nav>
  </section>

  <section class="container my-5 text-center">
    <h2 class="titulo-vendido mb-4">¿Qué es el buen trato?</h2>
    <p class="lead theme-subtext">Explora cómo aplicar la cultura de paz en los diferentes ámbitos de la vida.</p>
  </section>

  <main class="container mb-5">
    <div id="cards-container" class="d-flex flex-wrap justify-content-center gap-4"></div>
  </main>

  <!-- Modal -->
  <div class="modal fade" id="detalleProductoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content theme-modal">
        <div class="modal-header bg-success text-white">
          <h5 class="modal-title" id="detalleProductoModalLabel">Detalle del Ámbito</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-center p-4">
          <img id="detalle-imagen" src="" alt="Ámbito" class="img-fluid rounded mb-4 shadow">
          <div id="detalle-descripcion" class="text-start"></div>
        </div>
        <div class="modal-footer justify-content-center border-0">
          <button type="button" class="btn btn-secondary px-5" data-bs-dismiss="modal" style="border-radius: 25px;">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
